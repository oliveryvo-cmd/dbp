<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Welcome to S.A.B.O</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07090f;color:#fff;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.icon{font-size:100px;margin-bottom:24px;filter:drop-shadow(0 0 30px rgba(241,196,15,0.8));animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
h1{font-family:'Fredoka One',cursive;font-size:clamp(40px,8vw,80px);color:#f1c40f;margin-bottom:16px;letter-spacing:4px;}
p{font-size:20px;color:#888;max-width:500px;line-height:1.9;margin-bottom:12px;}
.tag{display:inline-block;background:#f1c40f;color:#000;border-radius:50px;padding:8px 28px;font-family:'Fredoka One',cursive;font-size:20px;margin-top:24px;letter-spacing:2px;}
a{display:inline-block;margin-top:32px;color:#f1c40f;font-weight:900;font-size:16px;text-decoration:none;border-bottom:2px solid #f1c40f;padding-bottom:2px;}
</style>
</head>
<body>
  <div class="icon">🛡️</div>
  <h1>WELCOME, RECRUIT</h1>
  <p>Your enlistment has been received. The Supreme Chief will review your application.</p>
  <p>Your mission starts now. Go do good.</p>
  <div class="tag">YOU ARE NOW S.A.B.O</div>
  <a href="index.html">← Back to S.A.B.O HQ</a>
</body>
</html>

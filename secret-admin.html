<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>D.B.P — Supreme General Command</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#0a1628;--blue:#1a3a6b;--gold:#c9a84c;--red:#b22222;}
body{background:var(--navy);color:#fff;font-family:'Source Sans 3',sans-serif;min-height:100vh;}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--blue);border:2px solid var(--gold);padding:48px 40px;max-width:380px;width:90%;text-align:center;}
.login-box h2{font-family:'Oswald',sans-serif;font-size:28px;color:var(--gold);letter-spacing:3px;margin-bottom:8px;}
.login-box p{color:#666;font-size:13px;margin-bottom:28px;letter-spacing:1px;}
.input{width:100%;background:#0a1628;border:2px solid #333;color:#fff;padding:12px 16px;font-size:16px;font-family:'Source Sans 3',sans-serif;margin-bottom:12px;outline:none;transition:border .2s;text-align:center;letter-spacing:4px;}
.input:focus{border-color:var(--gold);}
.btn{width:100%;background:var(--gold);border:none;padding:14px;font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;color:#000;cursor:pointer;font-weight:700;}
.btn:hover{background:#e8c060;}
.err{color:var(--red);font-size:13px;margin-top:8px;display:none;}

.admin-screen{display:none;padding:24px;}

.topbar{background:#000;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);margin:-24px -24px 28px;}
.topbar-logo{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:3px;}
.topbar-logo span{color:var(--gold);}
.topbar-tag{background:var(--red);padding:4px 14px;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--blue);border:1px solid rgba(201,168,76,0.3);border-top:3px solid var(--gold);padding:20px;text-align:center;}
.stat-num{font-family:'Oswald',sans-serif;font-size:40px;color:var(--gold);}
.stat-label{font-size:11px;color:#666;letter-spacing:2px;margin-top:4px;font-weight:700;}

.section-title{font-family:'Oswald',sans-serif;font-size:20px;color:var(--gold);letter-spacing:2px;margin-bottom:16px;border-bottom:2px solid rgba(201,168,76,0.3);padding-bottom:8px;}

.members-table{width:100%;border-collapse:collapse;margin-bottom:32px;}
.members-table th{background:#060e1a;color:var(--gold);font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;padding:12px 16px;text-align:left;border-bottom:2px solid var(--gold);}
.members-table td{padding:12px 16px;border-bottom:1px solid #111;font-size:14px;color:#ccc;}
.members-table tr:hover td{background:rgba(26,58,107,0.4);}
.rank-badge{display:inline-block;padding:3px 12px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;font-weight:700;}
.rank-RECRUIT{background:#333;color:#aaa;}
.rank-AGENT{background:#c9a84c;color:#000;}
.rank-OFFICER{background:#1a3a6b;color:#fff;}
.rank-SENIOR-OFFICER{background:#2d6a2d;color:#fff;}
.rank-CHIEF{background:#6b1a1a;color:#fff;}
.rank-GRAND-CHIEF{background:#4a1a7a;color:#fff;}

.promote-btn{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:4px 12px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.promote-btn:hover{background:var(--gold);color:#000;}
.delete-btn{background:transparent;border:1px solid var(--red);color:var(--red);padding:4px 12px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-left:4px;}
.delete-btn:hover{background:var(--red);color:#fff;}

.add-form{background:var(--blue);border:1px solid rgba(201,168,76,0.3);padding:24px;margin-bottom:32px;}
.add-form h3{font-family:'Oswald',sans-serif;color:var(--gold);letter-spacing:2px;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px;}
.form-input{background:#0a1628;border:2px solid #333;color:#fff;padding:10px 14px;font-size:14px;font-family:'Source Sans 3',sans-serif;outline:none;width:100%;}
.form-input:focus{border-color:var(--gold);}
.add-btn{background:var(--gold);border:none;padding:10px 28px;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:2px;color:#000;cursor:pointer;font-weight:700;}

.chat-log{background:#060e1a;border:1px solid #111;padding:20px;max-height:300px;overflow-y:auto;margin-bottom:32px;}
.chat-msg{padding:8px 0;border-bottom:1px solid #111;font-size:13px;}
.chat-msg:last-child{border-bottom:none;}
.chat-msg-name{color:var(--gold);font-weight:700;margin-right:8px;}
.chat-msg-time{color:#444;font-size:11px;float:right;}
.chat-msg-system{color:#555;font-style:italic;}

.clear-btn{background:var(--red);border:none;padding:8px 20px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;color:#fff;cursor:pointer;margin-top:8px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>⚠ SUPREME GENERAL</h2>
    <p>AUTHORIZED PERSONNEL ONLY</p>
    <input class="input" id="pwInput" type="password" placeholder="ENTER CODE" onkeydown="if(event.key==='Enter') checkPw()" />
    <button class="btn" onclick="checkPw()">ACCESS COMMAND →</button>
    <div class="err" id="err">ACCESS DENIED</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <div class="topbar">
    <div class="topbar-logo">D<span>.</span>B<span>.</span>P — <span>COMMAND CENTER</span></div>
    <div class="topbar-tag">⚠ SUPREME GENERAL ACCESS</div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="section-title">ADD MEMBER MANUALLY</div>
  <div class="add-form">
    <div class="form-row">
      <input class="form-input" id="addName" placeholder="Full Name" />
      <input class="form-input" id="addCode" placeholder="Code Name" />
      <input class="form-input" id="addRank" placeholder="Rank" value="RECRUIT" />
      <input class="form-input" id="addChapter" placeholder="Chapter / School" />
    </div>
    <button class="add-btn" onclick="addMember()">+ ADD MEMBER</button>
  </div>

  <div class="section-title">ALL MEMBERS</div>
  <table class="members-table">
    <thead>
      <tr>
        <th>#</th>
        <th>NAME</th>
        <th>CODE NAME</th>
        <th>RANK</th>
        <th>CHAPTER</th>
        <th>DATE</th>
        <th>ACTIONS</th>
      </tr>
    </thead>
    <tbody id="membersBody"></tbody>
  </table>

  <div class="section-title">CHAT LOG</div>
  <div class="chat-log" id="chatLog"></div>
  <button class="clear-btn" onclick="clearChat()">CLEAR ALL CHAT</button>
</div>

<script>
const PASSWORD = "oliver2026";
const RANKS = ["RECRUIT","AGENT","OFFICER","SENIOR OFFICER","CHIEF","GRAND CHIEF"];

function checkPw(){
  const pw = document.getElementById('pwInput').value;
  if(pw === PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('err').style.display = 'block';
  }
}

function getMembers(){ try{ return JSON.parse(localStorage.getItem('dbp_members')||'[]'); }catch(e){ return []; }}
function saveMembers(m){ localStorage.setItem('dbp_members', JSON.stringify(m)); }
function getChat(){ try{ return JSON.parse(localStorage.getItem('dbp_chat')||'[]'); }catch(e){ return []; }}

function loadAll(){
  const members = getMembers();
  // Stats
  const rankCounts = {};
  RANKS.forEach(r => rankCounts[r] = 0);
  members.forEach(m => { if(rankCounts[m.rank]!==undefined) rankCounts[m.rank]++; else rankCounts['RECRUIT']++; });
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${members.length}</div><div class="stat-label">TOTAL MEMBERS</div></div>
    <div class="stat-card"><div class="stat-num">${rankCounts['RECRUIT']}</div><div class="stat-label">RECRUITS</div></div>
    <div class="stat-card"><div class="stat-num">${rankCounts['AGENT']}</div><div class="stat-label">AGENTS</div></div>
    <div class="stat-card"><div class="stat-num">${rankCounts['OFFICER']+rankCounts['SENIOR OFFICER']}</div><div class="stat-label">OFFICERS</div></div>
    <div class="stat-card"><div class="stat-num">${rankCounts['CHIEF']+rankCounts['GRAND CHIEF']}</div><div class="stat-label">CHIEFS</div></div>
  `;
  // Members table
  const tbody = document.getElementById('membersBody');
  tbody.innerHTML = '';
  if(members.length === 0){
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#444;padding:32px;">No members yet.</td></tr>';
  } else {
    members.forEach((m, i) => {
      const rankClass = 'rank-' + m.rank.replace(/ /g,'-');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:#555;">${i+1}</td>
        <td style="color:#fff;font-weight:700;">${m.name}</td>
        <td>${m.code || '—'}</td>
        <td><span class="rank-badge ${rankClass}">${m.rank}</span></td>
        <td>${m.chapter || '—'}</td>
        <td style="color:#555;">${m.date || '—'}</td>
        <td>
          <button class="promote-btn" onclick="promote(${i})">PROMOTE</button>
          <button class="delete-btn" onclick="removeMember(${i})">REMOVE</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }
  // Chat
  const chat = getChat();
  const chatEl = document.getElementById('chatLog');
  chatEl.innerHTML = '';
  if(chat.length === 0){ chatEl.innerHTML = '<div style="color:#444;font-size:13px;">No messages yet.</div>'; }
  chat.slice(-50).reverse().forEach(m => {
    const div = document.createElement('div');
    div.className = 'chat-msg';
    const time = new Date(m.time).toLocaleString();
    if(m.system){
      div.innerHTML = `<span class="chat-msg-system">${m.text}</span><span class="chat-msg-time">${time}</span>`;
    } else {
      div.innerHTML = `<span class="chat-msg-name">${m.name} [${m.rank}]</span>${m.text.replace(/</g,'&lt;')}<span class="chat-msg-time">${time}</span>`;
    }
    chatEl.appendChild(div);
  });
}

function addMember(){
  const name = document.getElementById('addName').value.trim();
  if(!name){ alert('Enter a name!'); return; }
  const members = getMembers();
  members.push({
    name,
    code: document.getElementById('addCode').value.trim(),
    rank: document.getElementById('addRank').value.trim().toUpperCase() || 'RECRUIT',
    chapter: document.getElementById('addChapter').value.trim(),
    date: new Date().toLocaleDateString()
  });
  saveMembers(members);
  document.getElementById('addName').value = '';
  document.getElementById('addCode').value = '';
  document.getElementById('addChapter').value = '';
  loadAll();
}

function promote(i){
  const members = getMembers();
  const cur = RANKS.indexOf(members[i].rank);
  if(cur < RANKS.length - 1){ members[i].rank = RANKS[cur+1]; saveMembers(members); loadAll(); }
  else { alert('Already at max rank!'); }
}

function removeMember(i){
  if(!confirm('Remove this member?')) return;
  const members = getMembers();
  members.splice(i,1);
  saveMembers(members);
  loadAll();
}

function clearChat(){
  if(!confirm('Clear all chat messages?')) return;
  localStorage.removeItem('dbp_chat');
  loadAll();
}

setInterval(loadAll, 5000);
</script>
</body>
</html>

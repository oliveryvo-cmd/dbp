<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>S.A.B.O — Member Chat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#0a1628;--blue:#1a3a6b;--gold:#c9a84c;--red:#b22222;}
body{background:var(--navy);color:#fff;font-family:'Source Sans 3',sans-serif;height:100vh;display:flex;flex-direction:column;}

.topbar{background:#000;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);flex-shrink:0;}
.topbar-logo{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:3px;}
.topbar-logo span{color:var(--gold);}
.topbar-right{font-size:12px;color:#666;letter-spacing:1px;}

.login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--blue);border:2px solid var(--gold);padding:48px 40px;max-width:400px;width:100%;text-align:center;}
.login-box h2{font-family:'Oswald',sans-serif;font-size:28px;color:var(--gold);letter-spacing:3px;margin-bottom:8px;}
.login-box p{color:#888;font-size:14px;margin-bottom:28px;}
.input{width:100%;background:#0a1628;border:2px solid #333;color:#fff;padding:12px 16px;font-size:16px;font-family:'Source Sans 3',sans-serif;margin-bottom:12px;outline:none;transition:border .2s;}
.input:focus{border-color:var(--gold);}
.btn{width:100%;background:var(--gold);border:none;padding:14px;font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;color:#000;cursor:pointer;font-weight:700;transition:background .2s;}
.btn:hover{background:#e8c060;}

.chat-screen{flex:1;display:none;flex-direction:column;}
.chat-header{background:var(--blue);border-bottom:2px solid var(--gold);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.chat-header-left{font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);}
.chat-header-right{font-size:13px;color:#888;}
.online-dot{display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;margin-right:6px;}

.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:#0a0a14;}
.messages::-webkit-scrollbar-thumb{background:#333;}

.msg{display:flex;gap:12px;align-items:flex-start;}
.msg.mine{flex-direction:row-reverse;}
.msg-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:14px;color:var(--gold);flex-shrink:0;}
.msg-body{max-width:65%;}
.msg-name{font-size:12px;color:#888;margin-bottom:4px;font-weight:700;letter-spacing:1px;}
.msg.mine .msg-name{text-align:right;}
.msg-bubble{background:var(--blue);border:1px solid rgba(201,168,76,0.3);padding:10px 14px;border-radius:4px;font-size:15px;line-height:1.5;}
.msg.mine .msg-bubble{background:rgba(201,168,76,0.2);border-color:var(--gold);}
.msg-time{font-size:11px;color:#444;margin-top:4px;}
.msg.mine .msg-time{text-align:right;}

.system-msg{text-align:center;font-size:12px;color:#555;letter-spacing:1px;padding:4px 0;}

.chat-input-area{background:#060e1a;border-top:2px solid var(--gold);padding:16px 24px;display:flex;gap:12px;flex-shrink:0;}
.chat-input{flex:1;background:#0a1628;border:2px solid #333;color:#fff;padding:12px 16px;font-size:15px;font-family:'Source Sans 3',sans-serif;outline:none;transition:border .2s;}
.chat-input:focus{border-color:var(--gold);}
.send-btn{background:var(--gold);border:none;padding:12px 28px;font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:2px;color:#000;cursor:pointer;font-weight:700;transition:background .2s;flex-shrink:0;}
.send-btn:hover{background:#e8c060;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">S<span>.</span>A<span>.</span>B<span>.</span>O <span style="font-size:14px;color:#666;margin-left:8px;">MEMBER CHAT</span></div>
  <div class="topbar-right">SECURE CHANNEL</div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>ENTER THE CHANNEL</h2>
    <p>S.A.B.O members only. Enter your name and code name to join.</p>
    <input class="input" id="realName" placeholder="Your Name" />
    <input class="input" id="codeName" placeholder="Code Name (optional)" />
    <input class="input" id="rankInput" placeholder="Your Rank (e.g. AGENT)" />
    <button class="btn" onclick="joinChat()">JOIN CHANNEL →</button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-screen" id="chatScreen">
  <div class="chat-header">
    <div class="chat-header-left">⚡ S.A.B.O SECURE CHANNEL</div>
    <div class="chat-header-right"><span class="online-dot"></span><span id="onlineCount">1</span> online — <span id="myNameDisplay"></span></div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <input class="chat-input" id="msgInput" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMsg()" />
    <button class="send-btn" onclick="sendMsg()">SEND</button>
  </div>
</div>

<script>
let myName = '';
let myCode = '';
let myRank = '';

function joinChat(){
  const n = document.getElementById('realName').value.trim();
  const c = document.getElementById('codeName').value.trim();
  const r = document.getElementById('rankInput').value.trim().toUpperCase() || 'RECRUIT';
  if(!n){ alert('Enter your name!'); return; }
  myName = n;
  myCode = c || n;
  myRank = r;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('myNameDisplay').textContent = myName + ' [' + myRank + ']';
  addSystemMsg(myName + ' joined the channel.');
  loadMessages();
  document.getElementById('msgInput').focus();
  setInterval(loadMessages, 3000);
}

function getMessages(){
  try{ return JSON.parse(localStorage.getItem('sabo_chat') || '[]'); } catch(e){ return []; }
}

function saveMessages(msgs){
  localStorage.setItem('sabo_chat', JSON.stringify(msgs.slice(-100)));
}

function sendMsg(){
  const txt = document.getElementById('msgInput').value.trim();
  if(!txt) return;
  const msgs = getMessages();
  msgs.push({ name: myName, code: myCode, rank: myRank, text: txt, time: new Date().toISOString(), id: Date.now() });
  saveMessages(msgs);
  document.getElementById('msgInput').value = '';
  loadMessages();
}

let lastCount = 0;
function loadMessages(){
  const msgs = getMessages();
  if(msgs.length === lastCount) return;
  lastCount = msgs.length;
  const el = document.getElementById('messages');
  el.innerHTML = '';
  msgs.forEach(m => {
    const isMine = m.name === myName;
    const time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'msg' + (isMine ? ' mine' : '');
    div.innerHTML = `
      <div class="msg-avatar">${m.name.charAt(0).toUpperCase()}</div>
      <div class="msg-body">
        <div class="msg-name">${m.name} · ${m.rank}</div>
        <div class="msg-bubble">${m.text.replace(/</g,'&lt;')}</div>
        <div class="msg-time">${time}</div>
      </div>`;
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

function addSystemMsg(txt){
  const msgs = getMessages();
  msgs.push({ system: true, text: txt, time: new Date().toISOString(), id: Date.now() });
  saveMessages(msgs);
}
</script>
</body>
</html>
